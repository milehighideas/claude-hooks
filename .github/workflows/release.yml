name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false  # No external deps → no go.sum → nothing to cache

      - name: Run tests
        run: go test ./...

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build all platforms
        run: just build-all

      - name: Package archives
        run: |
          cd bin
          for platform in darwin-arm64 linux-amd64 linux-arm64 windows-amd64; do
            tar -czf "claude-hooks-${platform}.tar.gz" -C "$platform" .
          done

      - name: Create release
        # Still on v2 (Node 20) — softprops/action-gh-release#670 tracks the
        # Node 24 upgrade. Bump when a release lands.
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/claude-hooks-darwin-arm64.tar.gz
            bin/claude-hooks-linux-amd64.tar.gz
            bin/claude-hooks-linux-arm64.tar.gz
            bin/claude-hooks-windows-amd64.tar.gz
