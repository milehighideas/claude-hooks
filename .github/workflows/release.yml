name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false  # No external deps → no go.sum → nothing to cache

      - name: Run tests
        run: go test ./...

      - name: Install just
        uses: extractions/setup-just@v4

      # zig is the C cross-compiler for the tree-sitter (CGO) binaries.
      # One tool builds every release target (linux-amd64, linux-arm64,
      # windows-amd64). darwin is not released — it needs the Apple SDK.
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build and package release platforms
        run: just package

      - name: Create release
        # Still on v2 (Node 20) — softprops/action-gh-release#670 tracks the
        # Node 24 upgrade. Bump when a release lands.
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/claude-hooks-linux-amd64.tar.gz
            bin/claude-hooks-linux-arm64.tar.gz
            bin/claude-hooks-windows-amd64.tar.gz
